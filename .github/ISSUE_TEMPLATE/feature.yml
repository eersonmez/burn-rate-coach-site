name: Feature request
description: Suggest a focused improvement to Burn Rate Coach.
title: "[Feature] "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: What outcome would be useful?
    validations:
      required: true
  - type: dropdown
    id: frequency
    attributes:
      label: How often do you encounter this problem?
      options: [Every day, Every week, Occasionally, Not yet]
    validations:
      required: true
